name: CI/CD — Build, Push & Deploy to EC2

on:
  push:
    branches: [main]          # trigger on every push to main
  workflow_dispatch:           # allow manual runs from the Actions tab

# ── env vars shared across steps ──────────────────────────────────────────────
env:
  IMAGE_NAME: scholaris

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # JOB 1 — Build Docker image and push to Docker Hub
  # ────────────────────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Build cache lives in GitHub's cache service between runs
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Tag with both the git SHA (immutable) and "latest" (convenience)
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 2 — SSH into EC2 and deploy the new image
  # Runs only after job 1 succeeds
  # ────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}          # typically "ubuntu" or "ec2-user"
          key: ${{ secrets.EC2_SSH_KEY }}            # contents of your .pem file
          port: 22
          script: |
            set -e

            # ── Ensure Docker Compose V2 is installed (Binary Download) ────
            if ! docker compose version &>/dev/null; then
              sudo curl -L "https://github.com/docker/compose/releases/latest/download/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
              sudo chmod +x /usr/local/bin/docker-compose
              sudo mkdir -p /usr/lib/docker/cli-plugins
              sudo ln -sf /usr/local/bin/docker-compose /usr/lib/docker/cli-plugins/docker-compose
            fi

            echo "${{ secrets.DOCKERHUB_TOKEN }}" | \
              docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest

            # ── Gracefully restart the app container ──────────────────────
            # docker-compose.yml + .env live in ~/scholaris on the EC2 host
            cd ~/scholaris

            docker compose up -d --no-deps web

            # ── Prune old images to save disk space ───────────────────────
            docker image prune -f

            echo "✅  Deployment complete — $(date)"
